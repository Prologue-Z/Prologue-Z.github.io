# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: ZhangXu
subtitle: PhD Candidate in Robotics @ Tianjin University
description: |
  # 👋 张旭 (ZhangXu)
  
  ## PhD Candidate in Robotics
  
  **Tianjin University, Tianjin, China**
  
  ---
  
  ## 📧 Contact
  
  - **Email**: [tju_zhangxu@tju.edu.cn](mailto:tju_zhangxu@tju.edu.cn)
  - **GitHub**: [@Prologue-Z](https://github.com/Prologue-Z)
  - **Google Scholar**: [My Profile](https://scholar.google.com/citations?user=oEPuCTIAAAAJ)
  - **ORCID**: [0000-0002-0845-693X](https://orcid.org/0000-0002-0845-693X)
  
  ---
  
  ## 🔬 Research Focus
  
  My research lies at the intersection of **robotics** and **machine learning**, with a focus on:
  
  1. **Continuum Robotics** - Modeling, control, and motion planning for soft/continuum robots
  2. **Reinforcement Learning** - Deep RL for robotic manipulation and locomotion
  3. **Motion Planning** - Trajectory optimization in constrained environments
  4. **Sim-to-Real Transfer** - Bridging the gap between simulation and real-world deployment
keywords: robotics, continuum robot, reinforcement learning, motion planning, PhD, Tianjin University
author: ZhangXu
language: en
timezone: Asia/Shanghai

# URL
url: https://prologue-z.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: cactus

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: git@github.com-hexo-deploy:Prologue-Z/Prologue-Z.github.io.git
  branch: gh-pages
